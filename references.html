<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>参考界面 — 宝物/器魂仓库以及弹窗</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#fff;color:#2c2c2c;font-family:'Microsoft YaHei','PingFang SC',Arial,sans-serif;padding-bottom:40px;}
.page-header{background:#16161e;padding:28px 24px 24px;margin-bottom:32px;}
h1{text-align:center;color:#f0e6c8;font-size:22px;margin-bottom:6px;}
.subtitle{text-align:center;color:rgba(240,230,200,.7);font-size:13px;}
.back-link{display:inline-block;margin-bottom:20px;color:#c8a84e;text-decoration:none;font-size:14px;padding:6px 16px;border:1px solid rgba(200,168,78,.3);border-radius:8px;}
.back-link:hover{background:rgba(200,168,78,.1);}
.page-content{padding:0 24px;}
.section{margin-bottom:40px;}
.section-title{font-size:16px;color:#2c1e08;font-weight:bold;margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid #c8a84e;}
.image-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;}
.image-card{background:#f5f3ee;border:1px solid #e0d8c8;border-radius:12px;overflow:hidden;transition:transform .2s;}
.image-card:hover{transform:translateY(-2px);}
.image-card img{width:100%;display:block;cursor:pointer;}
.caption{padding:10px 14px;font-size:13px;color:#666;line-height:1.5;}
.lightbox{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center;cursor:pointer;}
.lightbox.show{display:flex;}
.lightbox img{max-width:95vw;max-height:95vh;object-fit:contain;cursor:default;user-select:none;}
.lightbox-close{position:absolute;top:16px;right:16px;width:36px;height:36px;border:none;border-radius:50%;background:rgba(255,255,255,.15);color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;}
.lightbox-close:hover{background:rgba(255,255,255,.3);}
</style>
</head>
<body>
<div class="page-header">
  <a class="back-link" href="index.html">← 返回交互演示</a>
  <h1>参考界面</h1>
  <p class="subtitle">本页汇总 references 目录下的本项目仓库界面与 KING SHOT 弹窗参考</p>
</div>
<div class="page-content">
  <div class="section">
    <div class="section-title">本项目 — 仓库界面</div>
    <div class="image-grid">
      <div class="image-card">
        <img src="references/本项目/本项目-仓库界面.png" onclick="openLB(this.src)" alt="本项目仓库界面">
        <div class="caption">本项目仓库界面：顶部资源栏、分页页签、5 列物品网格和底部信息区，用于新增宝物仓库/器魂仓库分页参考。</div>
      </div>
    </div>
  </div>
  <div class="section">
    <div class="section-title">KING SHOT — 装备相关弹窗</div>
    <div class="image-grid">
      <div class="image-card">
        <img src="references/KING SHOT/装备详情.jpg" onclick="openLB(this.src)" alt="装备详情">
        <div class="caption">装备详情：顶部基础信息与操作按钮，中部属性分组，底部操作与横向装备选择。</div>
      </div>
      <div class="image-card">
        <img src="references/KING SHOT/穿戴列表.jpg" onclick="openLB(this.src)" alt="穿戴列表">
        <div class="caption">穿戴列表：顶部当前穿戴，下方装备网格列表。</div>
      </div>
      <div class="image-card">
        <img src="references/KING SHOT/替换确认.jpg" onclick="openLB(this.src)" alt="替换确认">
        <div class="caption">替换确认：A → B 的图标对比与属性变化列表。</div>
      </div>
    </div>
  </div>
</div>
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLB()">✕</button>
  <img id="lb-img" src="" alt="preview">
</div>
<script>
var lbScale=1,lbDrag=false,lbSX=0,lbSY=0,lbTX=0,lbTY=0;
function applyLB(){document.getElementById('lb-img').style.transform='scale('+lbScale+') translate('+(lbTX/lbScale)+'px,'+(lbTY/lbScale)+'px)';}
function openLB(src){var lb=document.getElementById('lightbox'),img=document.getElementById('lb-img');img.src=src;lbScale=1;lbTX=0;lbTY=0;applyLB();lb.classList.add('show');document.body.style.overflow='hidden';}
function closeLB(){document.getElementById('lightbox').classList.remove('show');document.body.style.overflow='';}
(function(){var lb=document.getElementById('lightbox'),img=document.getElementById('lb-img');lb.addEventListener('click',function(e){if(e.target===lb)closeLB();});lb.addEventListener('wheel',function(e){e.preventDefault();lbScale=Math.max(.2,Math.min(10,lbScale*(e.deltaY>0?.9:1.1)));applyLB();},{passive:false});img.addEventListener('mousedown',function(e){e.preventDefault();lbDrag=true;lbSX=e.clientX-lbTX;lbSY=e.clientY-lbTY;img.style.cursor='grabbing';});document.addEventListener('mousemove',function(e){if(!lbDrag)return;lbTX=e.clientX-lbSX;lbTY=e.clientY-lbSY;applyLB();});document.addEventListener('mouseup',function(){lbDrag=false;img.style.cursor='default';});})();
</script>
</body>
</html>
